<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Salvador Admin</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Salvador</div>
    <div class="login-sub">Panel de administración</div>
    <div class="login-error" id="loginError">Email o contraseña incorrectos</div>
    <div class="login-campo">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@salvador.com" autocomplete="email">
    </div>
    <div class="login-campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn-login" onclick="login()">Ingresar al panel</button>
    <div style="text-align:center; margin-top:16px; color:var(--gris); font-size:.8rem;">— o —</div>
<button class="btn-google" onclick="loginGoogle()" style="width:100%; margin-top:12px;">
  <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right:8px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
  Ingresar con Google
</button>
  </div>
</div>
<script type="module">
  import { auth, signInWithEmailAndPassword } from './js/firebase.js';
  window.login = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    if (!email || !password) {
      errEl.textContent = 'Completá email y contraseña';
      errEl.style.display = 'block';
      return;
    }
    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'admin.html';
    } catch (error) {
      errEl.style.display = 'block';
    }
  };
</script>
</body>
</html>
